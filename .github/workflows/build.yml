on:
  pull_request:
  push:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
      - uses: xmake-io/github-action-setup-xmake@v1

      - uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/.xmake
            .xmake
          key: xmake-${{ runner.os }}-server-${{ hashFiles('xmake.lua', 'src/**') }}
          restore-keys: |
            xmake-${{ runner.os }}-server-
            xmake-${{ runner.os }}-

      - run: xmake repo -u

      - run: xmake f -a x64 -m release -p windows -y

      - run: xmake -y

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}-server-windows-x64
          path: bin/
